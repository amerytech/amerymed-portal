<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AmeryMed Portal</title>
    <style>
      :root {
        color-scheme: light;
        --bg-start: #0f8b8d;
        --bg-end: #123c7a;
        --panel: rgba(255, 255, 255, 0.12);
        --text: #f7fbff;
        --muted: rgba(247, 251, 255, 0.8);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 30%),
          linear-gradient(135deg, var(--bg-start), var(--bg-end));
        color: var(--text);
      }

      main {
        width: min(100%, 420px);
        padding: 28px 24px;
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 60px rgba(10, 22, 50, 0.25);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.85rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AmeryMed Portal</h1>
      <p>
        The mobile shell is ready. Set <code>CAPACITOR_SERVER_URL</code> before
        syncing so the iPhone and Android apps open the live portal.
      </p>
    </main>
  </body>
</html>
